  }
  function row(label, value) {
    return `<div class="info-list__row"><b>${label}</b><span>${U.esc(value || '—')}</span></div>`;
  }
  function mountModal(html) {
    const root = document.getElementById('modal-root');
    const back = U.fromHTML(html);
    root.appendChild(back);
    back.addEventListener('click', (e) => {
      if (e.target === back || e.target.closest('[data-close]')) back.remove();
    });
    document.addEventListener('keydown', function esc(ev) {
      if (ev.key === 'Escape') { back.remove(); document.removeEventListener('keydown', esc); }
    });
    return back;
  }

  PP.Clients = { render, openForm, openDetail, STATUS, statusLabel, statusBadge, mountModal };
})();


/* =====================================================================
   Prospeceve · projects.js
   Projetos: lista, criação/edição, timeline de etapas, checklist.
   Expõe window.PP.Projects.
   ===================================================================== */
(function () {
  'use strict';
  window.PP = window.PP || {};
  const U = PP.Utils;
  const STAGE_STATUS = { todo: 'A fazer', doing: 'Em andamento', done: 'Concluído' };

  function render(container) {
    const S = PP.Storage;
    const projects = S.projects.all();

    container.innerHTML = `
      <div class="page-head">
        <div>
          <h1 class="page-head__title">🌼 Projetos</h1>
          <div class="page-head__sub">${projects.length} projeto(s) em produção</div>
        </div>
        <div class="page-head__spacer"></div>
        <button class="pill-btn" id="prj-new"><span>＋</span> Novo projeto</button>
      </div>

      ${projects.length ? `<div class="grid grid--cards stagger">
        ${projects.map(cardHTML).join('')}
      </div>` : `<div class="cushion cushion--flat empty">
        <span class="empty__emoji">🌼</span>
        <div class="empty__title">Nenhum projeto ainda</div>
        <p>Crie um projeto e acompanhe cada etapa com carinho.</p>
        <div style="margin-top:14px"><button class="pill-btn" onclick="PP.Projects.openForm()"><span>＋</span> Novo projeto</button></div>
      </div>`}
    `;

    U.qs('#prj-new', container).onclick = () => openForm();
    container.querySelectorAll('[data-open]').forEach(el => el.onclick = () => openDetail(el.dataset.open));
    container.querySelectorAll('[data-edit]').forEach(el => el.onclick = e => { e.stopPropagation(); openForm(el.dataset.edit); });
    container.querySelectorAll('[data-del]').forEach(el => el.onclick = e => { e.stopPropagation(); removeProject(el.dataset.del); });
  }

  function progress(pr) { return PP.Dashboard.projectProgress(pr); }

  function cardHTML(pr) {
    const client = PP.Storage.clients.get(pr.clientId);
    const pct = progress(pr);
    const doneStages = pr.stages.filter(s => s.status === 'done').length;
    const checkDone = pr.checklist.filter(c => c.done).length;
    return `<article class="entity-card" data-open="${pr.id}" tabindex="0">
      <div class="entity-card__top">
        <div class="entity-card__avatar" style="background:linear-gradient(180deg,#ffe27a,#f4c430);color:#6a4b00">🌼</div>
        <div style="min-width:0">
          <div class="entity-card__name">${U.esc(pr.name)}</div>
          <div class="entity-card__meta">${client ? U.esc(client.name) : 'Sem cliente'}</div>
        </div>
      </div>
      <div class="entity-card__row">🧩 ${doneStages}/${pr.stages.length} etapas · ✅ ${checkDone}/${pr.checklist.length} checklist</div>
      <div class="entity-card__foot" style="flex-direction:column; align-items:stretch; gap:8px">
        <div style="display:flex; align-items:center; gap:8px">
          <div class="pbar" style="flex:1"><div class="pbar__fill" style="width:${pct}%"></div></div>
          <b>${pct}%</b>
        </div>
        <div style="display:flex; gap:8px">
          <button class="mini-btn" data-edit="${pr.id}">✏️ Editar</button>
          <button class="mini-btn mini-btn--danger" data-del="${pr.id}">🗑️ Excluir</button>
        </div>
      </div>
    </article>`;
  }

  /* ---------------- Criar / editar (dados básicos) ---------------- */
  function openForm(id) {
    const S = PP.Storage;
    const pr = id ? S.projects.get(id) : null;
    const clients = S.clients.all();

    const html = `
      <div class="modal-backdrop">
        <form class="modal" id="prj-form">
          <div class="modal__head">
            <h3 class="modal__title">${pr ? '✏️ Editar projeto' : '🌼 Novo projeto'}</h3>
            <button type="button" class="modal__close" data-close>✕</button>
          </div>
          <div class="form-grid">
            <div class="form-field form-field--full">
              <label for="pr-name">Nome do projeto *</label>
              <input class="input" id="pr-name" name="name" value="${U.esc(pr?.name || '')}" required>
            </div>
            <div class="form-field form-field--full">
              <label for="pr-client">Cliente</label>
              <select class="select" id="pr-client" name="clientId">
                <option value="">— Sem cliente —</option>
                ${clients.map(c => `<option value="${c.id}" ${pr?.clientId === c.id ? 'selected' : ''}>${U.esc(c.name)}</option>`).join('')}
              </select>
            </div>
          </div>
          <div class="form-actions">
            <button type="button" class="pill-btn pill-btn--ghost" data-close>Cancelar</button>
            <button type="submit" class="pill-btn pill-btn--green">💾 Salvar</button>
          </div>
        </form>
      </div>`;

    const back = PP.Clients.mountModal(html);
    back.querySelector('#prj-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const f = new FormData(e.target);
      const name = (f.get('name') || '').toString().trim();
      if (!name) { U.toast('Dê um nome ao projeto', 'warn'); return; }
      const clientId = f.get('clientId') || null;

      if (pr) {
        S.projects.update(pr.id, { name, clientId });
        U.toast('Projeto atualizado!', 'ok');
      } else {
        S.projects.add({ name, clientId, stages: S.defaultStages(), checklist: S.defaultChecklist() });
        S.log(`Novo projeto: “${name}”`, '🌼');
        U.toast('Projeto criado!', 'ok', '🌼');
      }
      back.remove();
      PP.Router.reload();
    });
  }

  /* ---------------- Detalhe: timeline + checklist ---------------- */
  function openDetail(id) {
    const S = PP.Storage;
    const pr = S.projects.get(id);
    if (!pr) return;
    const client = S.clients.get(pr.clientId);

    const html = `
      <div class="modal-backdrop">
        <div class="modal modal--wide">
          <div class="modal__head">
            <div class="entity-card__avatar" style="width:52px;height:52px;background:linear-gradient(180deg,#ffe27a,#f4c430);color:#6a4b00">🌼</div>
            <div>
              <h3 class="modal__title">${U.esc(pr.name)}</h3>
              <div class="page-head__sub">${client ? U.esc(client.name) : 'Sem cliente'} · <b id="pr-pct">${progress(pr)}%</b> concluído</div>
            </div>
            <button class="modal__close" data-close>✕</button>
          </div>

          <div class="pbar pbar--yellow" style="margin-bottom:18px"><div class="pbar__fill" id="pr-bar" style="width:${progress(pr)}%"></div></div>

          <h4 class="section-title">🧩 Etapas do projeto</h4>
          <div class="timeline" id="tl">
            ${pr.stages.map((s, i) => stageHTML(s, i)).join('')}
          </div>

          <h4 class="section-title" style="margin-top:20px">✅ Checklist de publicação</h4>
          <div class="check-grid" id="cl">
            ${pr.checklist.map((c, i) => `
              <div class="check-item ${c.done ? 'is-done' : ''}" data-check="${i}">
                <span class="check-box">${c.done ? '✓' : ''}</span>
                <span>${U.esc(c.name)}</span>
              </div>`).join('')}
          </div>

          <div class="form-actions">
            <button class="pill-btn pill-btn--danger" data-del="${pr.id}">🗑️ Excluir</button>
            <button class="pill-btn pill-btn--ghost" data-close>Fechar</button>
          </div>
        </div>
      </div>`;

    const back = PP.Clients.mountModal(html);

    // clique numa etapa avança o status (todo → doing → done → todo)
    back.querySelectorAll('[data-stage]').forEach(el => el.onclick = () => {
      const i = Number(el.dataset.stage);
      const order = ['todo', 'doing', 'done'];
      const cur = pr.stages[i].status;
      const next = order[(order.indexOf(cur) + 1) % order.length];
      pr.stages[i].status = next;
      pr.stages[i].progress = next === 'done' ? 100 : next === 'doing' ? 50 : 0;
      pr.stages[i].date = next === 'done' ? U.today() : pr.stages[i].date;
      S.projects.update(pr.id, { stages: pr.stages });
      // re-render da etapa e da barra
      el.outerHTML = stageHTML(pr.stages[i], i);
      rebind(back, pr);
      updateBar(back, pr);
      if (next === 'done') S.log(`Etapa “${pr.stages[i].name}” concluída em “${pr.name}”`, '✅');
    });

    // checklist toggle
    back.querySelectorAll('[data-check]').forEach(el => el.onclick = () => {
      const i = Number(el.dataset.check);
      pr.checklist[i].done = !pr.checklist[i].done;
      S.projects.update(pr.id, { checklist: pr.checklist });
      el.classList.toggle('is-done', pr.checklist[i].done);
      el.querySelector('.check-box').textContent = pr.checklist[i].done ? '✓' : '';
    });

    back.querySelector('[data-del]').onclick = () => { back.remove(); removeProject(pr.id); };
  }

  function stageHTML(s, i) {
    const cls = s.status === 'done' ? 'is-done' : s.status === 'doing' ? 'is-doing' : '';
    const dot = s.status === 'done' ? '✓' : s.status === 'doing' ? '…' : '○';
    return `<div class="tl-step ${cls}" data-stage="${i}" role="button" tabindex="0" title="Clique para avançar o status">
      <span class="tl-step__dot">${dot}</span>
      <div>
        <div class="tl-step__name">${U.esc(s.name)}</div>
        <div class="tl-step__meta">${STAGE_STATUS[s.status]}${s.date ? ' · ' + U.dateBR(s.date) : ''}</div>
      </div>
      <span class="chip">${s.progress || 0}%</span>
    </div>`;
  }

  // re-liga o handler da etapa recém-substituída
  function rebind(back, pr) {
    const S = PP.Storage;
    back.querySelectorAll('[data-stage]').forEach(el => {
      if (el._bound) return;
      el._bound = true;
      el.onclick = () => {
        const i = Number(el.dataset.stage);
        const order = ['todo', 'doing', 'done'];
        const next = order[(order.indexOf(pr.stages[i].status) + 1) % order.length];
        pr.stages[i].status = next;
        pr.stages[i].progress = next === 'done' ? 100 : next === 'doing' ? 50 : 0;
        pr.stages[i].date = next === 'done' ? U.today() : pr.stages[i].date;
        S.projects.update(pr.id, { stages: pr.stages });
        el.outerHTML = stageHTML(pr.stages[i], i);
        rebind(back, pr); updateBar(back, pr);
      };
    });
  }

  function updateBar(back, pr) {
    const pct = progress(pr);
    const bar = back.querySelector('#pr-bar'); const lbl = back.querySelector('#pr-pct');
    if (bar) bar.style.width = pct + '%';
    if (lbl) lbl.textContent = pct + '%';
  }

  function removeProject(id) {
    const pr = PP.Storage.projects.get(id);
    U.confirm(`Excluir o projeto “${pr?.name}”?`, { danger: true, okText: 'Excluir' }).then(ok => {
      if (!ok) return;
      PP.Storage.projects.remove(id);
      PP.Storage.log(`Projeto “${pr?.name}” excluído`, '🗑️');
      U.toast('Projeto excluído', 'info');
      PP.Router.reload();
    });
  }

  PP.Projects = { render, openForm, openDetail };
})();


/* =====================================================================
   Prospeceve · financial.js
   Controle financeiro: pagamentos, parcelas, formas de pagamento e
   totais automáticos (recebido, pendente, lucro mensal e anual).
   Expõe window.PP.Financial.
   ===================================================================== */
(function () {
  'use strict';
  window.PP = window.PP || {};
  const U = PP.Utils;
  const METHODS = ['PIX', 'Cartão', 'Dinheiro', 'Transferência', 'Boleto'];
  const PAY_STATUS = [
    { v: 'pago', t: 'Pago' }, { v: 'pendente', t: 'Pendente' }, { v: 'atrasado', t: 'Atrasado' },
  ];

  function totals() {
    const list = PP.Storage.payments.all();
    const contracted = list.reduce((s, p) => s + (Number(p.total) || 0), 0);
    const received = list.reduce((s, p) => s + (Number(p.received) || 0), 0);
    const pending = contracted - received;

    const now = new Date();
    const ym = now.toISOString().slice(0, 7);
    const y = String(now.getFullYear());
    const monthProfit = list.filter(p => (p.date || '').slice(0, 7) === ym)
      .reduce((s, p) => s + (Number(p.received) || 0), 0);
    const yearProfit = list.filter(p => (p.date || '').slice(0, 4) === y)
      .reduce((s, p) => s + (Number(p.received) || 0), 0);

    return { contracted, received, pending, monthProfit, yearProfit };
  }

  function render(container) {
    const S = PP.Storage;
    const payments = S.payments.all().sort((a, b) => (b.date || '').localeCompare(a.date || ''));
    const t = totals();

    container.innerHTML = `
      <div class="page-head">
        <div>
          <h1 class="page-head__title">🪙 Financeiro</h1>
          <div class="page-head__sub">Entradas, parcelas e o quanto seu ateliê rendeu 💛</div>
        </div>
        <div class="page-head__spacer"></div>
        <button class="pill-btn" id="pay-new"><span>＋</span> Novo pagamento</button>
      </div>

      <div class="grid grid--stats stagger">
        ${stat('green', '🪙', U.money(t.received), 'Total recebido')}
        ${stat('pink', '⏳', U.money(t.pending), 'Total pendente')}
        ${stat('yellow', '📅', U.money(t.monthProfit), 'Lucro do mês')}
        ${stat('blue', '📆', U.money(t.yearProfit), 'Lucro do ano')}
      </div>

      <section class="cushion" style="margin-top:22px">
        <h3 class="section-title">💳 Pagamentos <span class="count-pill">${payments.length}</span></h3>
        ${payments.length ? `<div class="table-wrap"><table class="p-table">
          <thead><tr>
            <th>Cliente</th><th>Total</th><th>Recebido</th><th>Restante</th>
            <th>Forma</th><th>Parcelas</th><th>Status</th><th>Data</th><th></th>
          </tr></thead>
          <tbody>
            ${payments.map(rowHTML).join('')}
          </tbody>
        </table></div>` : `<div class="empty"><span class="empty__emoji">🪙</span>
          <div class="empty__title">Nenhum pagamento registrado</div>
          <p>Registre entradas e parcelas para acompanhar o financeiro.</p></div>`}
      </section>
    `;

    U.qs('#pay-new', container).onclick = () => openForm();
    container.querySelectorAll('[data-edit]').forEach(el => el.onclick = () => openForm(el.dataset.edit));
    container.querySelectorAll('[data-del]').forEach(el => el.onclick = () => removePayment(el.dataset.del));
  }

  function stat(color, ico, value, label) {
    return `<div class="stat stat--${color}"><div class="stat__ico">${ico}</div>
      <div class="stat__value">${value}</div><div class="stat__label">${label}</div></div>`;
  }

  function rowHTML(p) {
    const client = PP.Storage.clients.get(p.clientId);
    const rest = (Number(p.total) || 0) - (Number(p.received) || 0);
    return `<tr>
      <td><b>${U.esc(client?.name || '—')}</b></td>
      <td>${U.money(p.total)}</td>
      <td>${U.money(p.received)}</td>
      <td>${U.money(rest)}</td>
      <td><span class="chip">${U.esc(p.method || '—')}</span></td>
      <td>${p.installments || 1}x</td>
      <td><span class="status status--${p.status}">${statusLabel(p.status)}</span></td>
      <td>${U.dateBR(p.date)}</td>
      <td><div class="row-actions">
        <button class="mini-btn" data-edit="${p.id}">✏️</button>
        <button class="mini-btn mini-btn--danger" data-del="${p.id}">🗑️</button>
      </div></td>
    </tr>`;
  }
  const statusLabel = v => (PAY_STATUS.find(s => s.v === v) || { t: v }).t;

  function openForm(id) {
    const S = PP.Storage;
    const p = id ? S.payments.get(id) : null;
    const clients = S.clients.all();
    const projects = S.projects.all();

    const html = `
      <div class="modal-backdrop">
        <form class="modal" id="pay-form">
          <div class="modal__head">
            <h3 class="modal__title">${p ? '✏️ Editar pagamento' : '🪙 Novo pagamento'}</h3>
            <button type="button" class="modal__close" data-close>✕</button>
          </div>
          <div class="form-grid">
            <div class="form-field form-field--full">
              <label for="pay-client">Cliente *</label>
              <select class="select" id="pay-client" name="clientId" required>
                <option value="">— Selecione —</option>
                ${clients.map(c => `<option value="${c.id}" ${p?.clientId === c.id ? 'selected' : ''}>${U.esc(c.name)}</option>`).join('')}
              </select>
            </div>
            <div class="form-field form-field--full">
              <label for="pay-project">Projeto (opcional)</label>
              <select class="select" id="pay-project" name="projectId">
                <option value="">— Nenhum —</option>
                ${projects.map(pr => `<option value="${pr.id}" ${p?.projectId === pr.id ? 'selected' : ''}>${U.esc(pr.name)}</option>`).join('')}
              </select>
            </div>
            ${num('total', 'Valor total (R$)', p?.total)}
            ${num('entry', 'Entrada (R$)', p?.entry)}
            ${num('received', 'Já recebido (R$)', p?.received)}
            ${num('installments', 'Parcelas', p?.installments || 1)}
            <div class="form-field">
              <label for="pay-method">Forma de pagamento</label>
              <select class="select" id="pay-method" name="method">
                ${METHODS.map(m => `<option ${p?.method === m ? 'selected' : ''}>${m}</option>`).join('')}
              </select>
            </div>
            <div class="form-field">
              <label for="pay-status">Status</label>
              <select class="select" id="pay-status" name="status">
                ${PAY_STATUS.map(s => `<option value="${s.v}" ${(p?.status || 'pendente') === s.v ? 'selected' : ''}>${s.t}</option>`).join('')}
              </select>
            </div>
            <div class="form-field">
              <label for="pay-date">Data</label>
              <input class="input" id="pay-date" name="date" type="date" value="${U.esc(p?.date || U.today())}">
            </div>
            <div class="form-field form-field--full">
              <label for="pay-notes">Observações</label>
              <textarea class="textarea" id="pay-notes" name="notes">${U.esc(p?.notes || '')}</textarea>
            </div>
          </div>
          <div class="form-actions">
            <button type="button" class="pill-btn pill-btn--ghost" data-close>Cancelar</button>
            <button type="submit" class="pill-btn pill-btn--green">💾 Salvar</button>
          </div>
        </form>
      </div>`;

    const back = PP.Clients.mountModal(html);
    back.querySelector('#pay-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const f = new FormData(e.target);
      if (!f.get('clientId')) { U.toast('Escolha o cliente', 'warn'); return; }
      const data = {
        clientId: f.get('clientId'), projectId: f.get('projectId') || null,
        total: Number(f.get('total')) || 0, entry: Number(f.get('entry')) || 0,
        received: Number(f.get('received')) || 0, installments: Number(f.get('installments')) || 1,
        method: f.get('method'), status: f.get('status'), date: f.get('date'), notes: f.get('notes'),
      };
      const client = S.clients.get(data.clientId);
      if (p) { S.payments.update(p.id, data); U.toast('Pagamento atualizado!', 'ok'); }
      else {
        S.payments.add(data);
        S.log(`Pagamento registrado · ${client?.name || ''} · ${U.money(data.total)}`, '🪙');
        U.toast('Pagamento registrado!', 'ok', '💛');
      }
      back.remove();
      PP.Notifications.refreshBadge();
      PP.Router.reload();
    });
  }

  function num(name, label, value) {
    return `<div class="form-field"><label for="pay-${name}">${label}</label>
      <input class="input" id="pay-${name}" name="${name}" type="number" min="0" step="0.01" value="${value ?? ''}"></div>`;
  }

  function removePayment(id) {
    U.confirm('Excluir este pagamento?', { danger: true, okText: 'Excluir' }).then(ok => {

      PP.Storage.payments.remove(id);

      U.toast('Pagamento excluído', 'info');
      PP.Notifications.refreshBadge();
      PP.Router.reload();
    });
  }

  PP.Financial = { render, openForm, totals };
})();


/* =====================================================================
   Prospeceve · calendar.js
   Calendário mensal navegável. Junta em cada dia:
   pagamentos, entregas de projeto, follow-ups e renovações de domínio.
   Expõe window.PP.Calendar.
   ===================================================================== */
(function () {
  'use strict';
  window.PP = window.PP || {};
  const U = PP.Utils;
  const DOW = ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'];
  const MONTHS = ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho',
    'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'];

  let cursor = new Date(); cursor.setDate(1);

  /* Constrói um mapa { 'yyyy-mm-dd': [ {type,label} ] }. */
  function buildEvents() {
    const S = PP.Storage;
    const ev = {};
    const push = (iso, type, label) => {
      if (!iso) return;
      const key = iso.slice(0, 10);
      (ev[key] = ev[key] || []).push({ type, label });
    };

    S.payments.all().forEach(p => {
      const c = S.clients.get(p.clientId);
      push(p.date, 'pay', `💵 ${c?.name || 'Pagamento'} · ${U.money(p.total)}`);
    });
    S.clients.all().forEach(c => {
      push(c.nextFollowup, 'fup', `🌸 Follow-up · ${c.name}`);
      if (c.domain?.expires) push(c.domain.expires, 'del', `🌐 Renovação · ${c.company || c.name}`);
      if (c.maintenance?.nextPayment) push(c.maintenance.nextPayment, 'pay', `🔧 Manutenção · ${c.name}`);
    });
    S.projects.all().forEach(pr => {
      const pub = pr.stages.find(s => s.name === 'Publicação');
      if (pub?.date) push(pub.date, 'del', `📦 Entrega · ${pr.name}`);
    });
    return ev;
  }

  function render(container) {
    const events = buildEvents();
    const y = cursor.getFullYear(), m = cursor.getMonth();
    const first = new Date(y, m, 1);
    const startDow = first.getDay();
    const daysInMonth = new Date(y, m + 1, 0).getDate();
    const todayISO = U.today();

    const cells = [];
    // dias do mês anterior para preencher
    const prevDays = new Date(y, m, 0).getDate();
    for (let i = startDow - 1; i >= 0; i--) cells.push({ out: true, day: prevDays - i, iso: null });
    for (let d = 1; d <= daysInMonth; d++) {
      const iso = `${y}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
      cells.push({ out: false, day: d, iso });
    }
    while (cells.length % 7 !== 0) cells.push({ out: true, day: cells.length, iso: null });

    container.innerHTML = `
      <div class="page-head">
        <div>
          <h1 class="page-head__title">📅 Calendário</h1>
          <div class="page-head__sub">Pagamentos, entregas, reuniões, follow-ups e renovações</div>
        </div>
      </div>

      <section class="cushion">
        <div class="cal-head">
          <button class="icon-btn" id="cal-prev" aria-label="Mês anterior">‹</button>
          <h3 style="font-size:20px; min-width:190px; text-align:center">${MONTHS[m]} ${y}</h3>
          <button class="icon-btn" id="cal-next" aria-label="Próximo mês">›</button>
          <div class="page-head__spacer"></div>
          <button class="pill-btn pill-btn--ghost pill-btn--sm" id="cal-today">Hoje</button>
        </div>

        <div class="cal-grid" style="margin-bottom:8px">
          ${DOW.map(d => `<div class="cal-dow">${d}</div>`).join('')}
        </div>
        <div class="cal-grid">
          ${cells.map(c => {
            const list = c.iso ? (events[c.iso] || []) : [];
            const isToday = c.iso === todayISO;
            return `<div class="cal-cell ${c.out ? 'is-out' : ''} ${isToday ? 'is-today' : ''}">
              <span class="cal-cell__num">${c.day}</span>
              ${list.slice(0, 3).map(e => `<span class="cal-event cal-event--${e.type}" title="${U.esc(e.label)}">${U.esc(e.label)}</span>`).join('')}
              ${list.length > 3 ? `<span class="page-head__sub" style="font-size:10px">+${list.length - 3} mais</span>` : ''}
            </div>`;
          }).join('')}
        </div>

        <div style="display:flex; gap:14px; flex-wrap:wrap; margin-top:16px; font-size:12px">
          <span class="chip cal-event--pay">💵 Pagamentos</span>
          <span class="chip cal-event--del">📦 Entregas / renovações</span>
          <span class="chip cal-event--fup">🌸 Follow-ups</span>
        </div>
      </section>
    `;

    U.qs('#cal-prev', container).onclick = () => { cursor.setMonth(cursor.getMonth() - 1); render(container); };
    U.qs('#cal-next', container).onclick = () => { cursor.setMonth(cursor.getMonth() + 1); render(container); };
    U.qs('#cal-today', container).onclick = () => { cursor = new Date(); cursor.setDate(1); render(container); };
  }

  PP.Calendar = { render };
})();


/* =====================================================================
   Prospeceve · reports.js
   Relatórios: clientes por status, financeiro, projetos, produção,
   faturamento por forma de pagamento. Expõe window.PP.Reports.
   ===================================================================== */
(function () {
  'use strict';
  window.PP = window.PP || {};
  const U = PP.Utils;

  function render(container) {
    const S = PP.Storage;
    const clients = S.clients.all();
    const projects = S.projects.all();
    const payments = S.payments.all();
    const t = PP.Financial.totals();

    // clientes por status
    const byStatus = {};
    clients.forEach(c => byStatus[c.status] = (byStatus[c.status] || 0) + 1);

    // faturamento por forma de pagamento
    const byMethod = {};
    payments.forEach(p => byMethod[p.method || '—'] = (byMethod[p.method || '—'] || 0) + (Number(p.received) || 0));

    // produção: etapas concluídas x total
    let stagesDone = 0, stagesTotal = 0;
    projects.forEach(pr => { stagesTotal += pr.stages.length; stagesDone += pr.stages.filter(s => s.status === 'done').length; });

    const published = clients.filter(c => c.status === 'publicado' || c.status === 'finalizado').length;
    const lost = clients.filter(c => c.status === 'perdido').length;
    const conversion = clients.length ? Math.round((clients.filter(c => c.proposal?.accepted).length / clients.length) * 100) : 0;

    container.innerHTML = `
      <div class="page-head">
        <div>
          <h1 class="page-head__title">📋 Relatórios</h1>
          <div class="page-head__sub">Uma visão geral do seu ateliê, com carinho pelos números 💐</div>
        </div>
        <div class="page-head__spacer"></div>
        <button class="pill-btn pill-btn--ghost" id="rep-print">🖨️ Imprimir</button>
      </div>

      <div class="grid grid--stats stagger">
        ${stat('green', '🧵', clients.length, 'Clientes')}
        ${stat('blue', '🚀', published, 'Publicados')}
        ${stat('pink', '💔', lost, 'Perdidos')}
        ${stat('yellow', '🎯', conversion + '%', 'Conversão')}
      </div>

      <div class="grid grid--2" style="margin-top:22px; align-items:start">
        <section class="cushion">
          <h3 class="section-title">🧵 Clientes por status</h3>
          ${Object.keys(byStatus).length ? Object.entries(byStatus)
            .sort((a, b) => b[1] - a[1])
            .map(([st, n]) => barRow(PP.Clients.statusLabel(st), n, clients.length)).join('')
            : vazio()}
        </section>

        <section class="cushion">
          <h3 class="section-title">💳 Faturamento por forma</h3>
          ${Object.keys(byMethod).length ? Object.entries(byMethod)
            .sort((a, b) => b[1] - a[1])
            .map(([m, v]) => barRow(m, v, t.received, true)).join('')
            : vazio()}
        </section>
      </div>

      <div class="grid grid--2" style="margin-top:22px; align-items:start">
        <section class="cushion">
          <h3 class="section-title">🪙 Resumo financeiro</h3>
          <div class="info-list">
            ${line('Total contratado', U.money(t.contracted))}
            ${line('Total recebido', U.money(t.received))}
            ${line('Total pendente', U.money(t.pending))}
            ${line('Lucro do mês', U.money(t.monthProfit))}
            ${line('Lucro do ano', U.money(t.yearProfit))}
          </div>
        </section>

        <section class="cushion">
          <h3 class="section-title">🌼 Produção</h3>
          <div class="info-list">
            ${line('Projetos', projects.length)}
            ${line('Etapas concluídas', `${stagesDone} de ${stagesTotal}`)}
            ${line('Progresso geral', (stagesTotal ? Math.round(stagesDone / stagesTotal * 100) : 0) + '%')}
          </div>
          <div class="pbar" style="margin-top:14px"><div class="pbar__fill" style="width:${stagesTotal ? Math.round(stagesDone / stagesTotal * 100) : 0}%"></div></div>
        </section>
      </div>
    `;

    U.qs('#rep-print', container).onclick = () => window.print();
  }

  function barRow(label, value, total, money = false) {
    const pct = total ? Math.round((value / total) * 100) : 0;
    return `<div class="progress-row">
      <span class="progress-row__label">${U.esc(label)}</span>
      <div class="pbar pbar--blue" style="flex:1"><div class="pbar__fill" style="width:${pct}%"></div></div>
      <span class="progress-row__pct">${money ? U.money(value) : value}</span>
    </div>`;
  }
  function stat(color, ico, value, label) {
    return `<div class="stat stat--${color}"><div class="stat__ico">${ico}</div>
      <div class="stat__value">${value}</div><div class="stat__label">${label}</div></div>`;
  }
  function line(l, v) { return `<div class="info-list__row"><b>${l}</b><span>${v}</span></div>`; }
  function vazio() { return `<div class="page-head__sub" style="padding:12px 0">Sem dados suficientes ainda 🌱</div>`; }

  PP.Reports = { render };
})();


/* =====================================================================
   Prospeceve · files.js
   Arquivos: registro de logos, fotos, textos e documentos por cliente.
   Guarda metadados (nome, tipo, tamanho, data) no LocalStorage.
   Expõe window.PP.Files.
   ===================================================================== */
(function () {
  'use strict';
  window.PP = window.PP || {};
  const U = PP.Utils;
  const KINDS = ['Logo', 'Fotos', 'Textos', 'Contrato', 'Documento', 'Outro'];

  function render(container) {
    const S = PP.Storage;
    const files = S.files.all().sort((a, b) => (b.date || '').localeCompare(a.date || ''));

    container.innerHTML = `
      <div class="page-head">
        <div>
          <h1 class="page-head__title">☁️ Arquivos</h1>
          <div class="page-head__sub">Guarde referências de logos, fotos e documentos de cada cliente</div>
        </div>
        <div class="page-head__spacer"></div>

      </div>` : `<div class="cushion cushion--flat empty">
        <span class="empty__emoji">☁️</span>
        <div class="empty__title">Nenhum arquivo registrado</div>
        <p>Registre aqui os arquivos que você recebe dos clientes.</p>
        <div style="margin-top:14px"><button class="pill-btn" onclick="PP.Files.openForm()"><span>＋</span> Registrar arquivo</button></div>
      </div>`}
    `;

    U.qs('#file-new', container).onclick = () => openForm();
    container.querySelectorAll('[data-del]').forEach(el => el.onclick = () => removeFile(el.dataset.del));
  }

  function cardHTML(f) {
    const client = PP.Storage.clients.get(f.clientId);
    const ico = ({ Logo: '🎨', Fotos: '📷', Textos: '📝', Contrato: '📄', Documento: '📁' }[f.kind]) || '📎';
    return `<article class="entity-card">
      <div class="entity-card__top">
        <div class="entity-card__avatar" style="background:linear-gradient(180deg,#d5f0ff,#81d4fa);color:#0c4f6b">${ico}</div>
        <div style="min-width:0">
          <div class="entity-card__name" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${U.esc(f.name)}</div>
          <div class="entity-card__meta">${U.esc(f.kind || 'Arquivo')} · ${U.esc(f.size || '')}</div>
        </div>
      </div>
      <div class="entity-card__row">🧵 ${U.esc(client?.name || 'Sem cliente')}</div>
      <div class="entity-card__row">🗓️ ${U.dateBR(f.date)}</div>
      <div class="entity-card__foot">
        <button class="mini-btn mini-btn--danger" data-del="${f.id}">🗑️ Remover</button>
      </div>
    </article>`;
  }

  function openForm() {
    const S = PP.Storage;
    const clients = S.clients.all();
    const html = `
      <div class="modal-backdrop">
        <form class="modal" id="file-form">
          <div class="modal__head">
            <h3 class="modal__title">☁️ Registrar arquivo</h3>
            <button type="button" class="modal__close" data-close>✕</button>
          </div>
          <div class="form-grid">
            <div class="form-field form-field--full">
              <label for="fl-client">Cliente</label>
              <select class="select" id="fl-client" name="clientId">
                <option value="">— Sem cliente —</option>
                ${clients.map(c => `<option value="${c.id}">${U.esc(c.name)}</option>`).join('')}
              </select>
            </div>
            <div class="form-field form-field--full">
              <label for="fl-name">Nome do arquivo *</label>
              <input class="input" id="fl-name" name="name" placeholder="ex.: logo-cliente.png" required>
            </div>
            <div class="form-field">
              <label for="fl-kind">Tipo</label>
              <select class="select" id="fl-kind" name="kind">
                ${KINDS.map(k => `<option>${k}</option>`).join('')}
              </select>
            </div>
            <div class="form-field">
              <label for="fl-size">Tamanho</label>
              <input class="input" id="fl-size" name="size" placeholder="ex.: 84 KB">
            </div>
          </div>
          <div class="form-actions">
            <button type="button" class="pill-btn pill-btn--ghost" data-close>Cancelar</button>
            <button type="submit" class="pill-btn pill-btn--green">💾 Registrar</button>
          </div>
        </form>
      </div>`;
    const back = PP.Clients.mountModal(html);
    back.querySelector('#file-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const f = new FormData(e.target);
      const name = (f.get('name') || '').toString().trim();
      if (!name) { U.toast('Informe o nome do arquivo', 'warn'); return; }
      S.files.add({ clientId: f.get('clientId') || null, name, kind: f.get('kind'),
        size: f.get('size'), date: U.today() });
      S.log(`Arquivo registrado: ${name}`, '☁️');
      U.toast('Arquivo registrado!', 'ok', '☁️');
      back.remove();
      PP.Router.reload();
    });
  }

  function removeFile(id) {
    U.confirm('Remover este arquivo do registro?', { danger: true, okText: 'Remover' }).then(ok => {
      if (!ok) return;
      PP.Storage.files.remove(id);
      U.toast('Arquivo removido', 'info');
      PP.Router.reload();
    });
  }

  PP.Files = { render, openForm };
})();

/* =====================================================================
   Prospeceve · router.js
   Roteador SPA por hash (#/rota). Renderiza o módulo certo no #app-content
   sem recarregar a página. Expõe window.PP.Router.
   ===================================================================== */
(function () {
  'use strict';
  window.PP = window.PP || {};

  const routes = {
    dashboard:     () => PP.Dashboard,
    clientes:      () => PP.Clients,
    projetos:      () => PP.Projects,
    financeiro:    () => PP.Financial,
    calendario:    () => PP.Calendar,
    relatorios:    () => PP.Reports,
    arquivos:      () => PP.Files,
    configuracoes: () => PP.Settings,
  };

  function current() {
    const hash = (location.hash || '#/dashboard').replace(/^#\//, '');
    return routes[hash] ? hash : 'dashboard';
  }

  function handle() {
    const name = current();
    const content = document.getElementById('app-content');
    if (!content) return;

    // marca o item ativo no menu
    document.querySelectorAll('.nav-item').forEach(a =>
      a.classList.toggle('is-active', a.dataset.route === name));

    // renderiza com uma animação de entrada
    content.classList.remove('fade-in'); void content.offsetWidth; content.classList.add('fade-in');
    const mod = routes[name]();
    try {
      mod.render(content);
    } catch (e) {
      console.error('Erro ao renderizar a rota', name, e);
      content.innerHTML = `<div class="cushion empty"><span class="empty__emoji">😿</span>
        <div class="empty__title">Algo tropeçou nas costuras…</div>
        <p>${PP.Utils.esc(e.message)}</p></div>`;
    }

    // fecha o menu no mobile e rola ao topo
    document.getElementById('app')?.classList.remove('sidebar-open');
    document.getElementById('overlay')?.setAttribute('hidden', '');
    content.scrollTop = 0;

    // atualiza notificações
    PP.Notifications.refreshBadge();
  }

  const Router = {
    start() { window.addEventListener('hashchange', handle); handle(); },
    /** Re-renderiza a rota atual (após criar/editar/excluir algo). */
    reload() { handle(); },
    go(name) { location.hash = '#/' + name; },
    current,
  };

  PP.Router = Router;
})();


/* =====================================================================
   Prospeceve · app.js
   Ponto de entrada. Cuida da tela de carregamento, da barra superior,
   do tema, da busca global e liga tudo ao roteador.
   Expõe window.PP.App.
   ===================================================================== */
(function () {
  'use strict';
  window.PP = window.PP || {};
  const U = PP.Utils;

  /* ---------- Tela de carregamento ---------- */
  function runLoading(done) {
    const screen = document.getElementById('loading-screen');
    const fill = document.getElementById('loading-bar-fill');
    const percent = document.getElementById('loading-percent');
    let p = 0;

    const tick = () => {
      p += Math.random() * 18 + 6;
      if (p >= 100) p = 100;
      fill.style.width = p + '%';
      percent.textContent = Math.floor(p) + '%';
      if (p < 100) {
        setTimeout(tick, 180 + Math.random() * 160);
      } else {
        setTimeout(() => {
          screen.classList.add('is-hidden');
          setTimeout(() => { screen.remove(); done(); }, 600);
        }, 350);
      }
    };
    setTimeout(tick, 300);
  }

  /* ---------- Tema ---------- */
  function setTheme(theme) {
    document.body.classList.toggle('theme-dark', theme === 'dark');
    const btn = document.getElementById('btn-theme');
    if (btn) btn.textContent = theme === 'dark' ? '☀️' : '🌙';
    PP.Storage.saveSettings({ theme });
  }
  function toggleTheme() {
    const cur = PP.Storage.settings().theme === 'dark' ? 'light' : 'dark';
    setTheme(cur);
  }

  const ACCENTS = ['green', 'pink', 'blue', 'lilac'];
  function setAccentTheme(accent) {
    if (!ACCENTS.includes(accent)) accent = 'green';
    ACCENTS.forEach(a => document.body.classList.remove('theme-accent-' + a));
    if (accent !== 'green') document.body.classList.add('theme-accent-' + accent);
    PP.Storage.saveSettings({ accentTheme: accent });
  }

  /* ---------- Perfil no topo ---------- */
  function refreshProfile() {
    const s = PP.Storage.settings();
    const avatar = document.getElementById('profile-avatar');
    const name = document.getElementById('profile-name');
    if (avatar) avatar.textContent = U.initials(s.userName || 'Você');
    if (name) name.textContent = s.userName || 'Você';
  }

  /* ---------- Busca global ---------- */
  function setupSearch() {
    const input = document.getElementById('global-search');
    const box = document.getElementById('search-results');
    if (!input) return;

    const run = U.debounce(() => {
      const q = input.value.trim().toLowerCase();
      if (!q) { box.hidden = true; box.innerHTML = ''; return; }

      const S = PP.Storage;
      const results = [];
      S.clients.all().forEach(c => {
        if ([c.name, c.company, c.phone, c.city, c.region].some(f => (f || '').toLowerCase().includes(q)))
          results.push({ ico: '🧵', label: c.name, sub: c.company || c.city || '', action: () => PP.Clients.openDetail(c.id) });
      });
      S.projects.all().forEach(pr => {
        if ((pr.name || '').toLowerCase().includes(q))
          results.push({ ico: '🌼', label: pr.name, sub: 'Projeto', action: () => PP.Projects.openDetail(pr.id) });
      });

      if (!results.length) {
        box.innerHTML = `<div class="search__result">🔍 <span>Nada encontrado para “${U.esc(q)}”</span></div>`;
      } else {
        box.innerHTML = results.slice(0, 8).map((r, i) => `
          <div class="search__result" data-i="${i}">
            <span>${r.ico}</span><span>${U.esc(r.label)}</span><small>${U.esc(r.sub)}</small>
          </div>`).join('');
        box.querySelectorAll('[data-i]').forEach(el => el.onclick = () => {
          results[Number(el.dataset.i)].action();
          box.hidden = true; input.value = '';
        });
      }
      box.hidden = false;
    }, 200);

    input.addEventListener('input', run);
    // fecha ao clicar fora
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.search')) box.hidden = true;
    });
  }

  /* ---------- Notificações ---------- */
  function setupNotifications() {
    const btn = document.getElementById('btn-notifications');
    const panel = document.getElementById('notif-panel');
    btn.onclick = (e) => {
      e.stopPropagation();
      const willOpen = panel.hidden;
      if (willOpen) PP.Notifications.renderPanel();
      panel.hidden = !willOpen;
    };
    document.addEventListener('click', (e) => {
      if (!e.target.closest('#notif-panel') && !e.target.closest('#btn-notifications')) panel.hidden = true;
    });
  }

  /* ---------- Menu mobile ---------- */
  function setupMobileMenu() {
    const app = document.getElementById('app');
    const overlay = document.getElementById('overlay');
    document.getElementById('menu-toggle').onclick = () => {
      const open = app.classList.toggle('sidebar-open');
      overlay.hidden = !open;
    };
    overlay.onclick = () => { app.classList.remove('sidebar-open'); overlay.hidden = true; };
  }

  /* ---------- Menu compacto (recolher/expandir no desktop) ---------- */
  function setupSidebarCollapse() {
    const app = document.getElementById('app');
    const btn = document.getElementById('sidebar-collapse-btn');
    if (!btn) return;
    btn.onclick = () => {
      const compact = app.classList.toggle('sidebar-compact');
      btn.textContent = compact ? '»' : '«';
      btn.title = compact ? 'Expandir menu' : 'Recolher menu';
      PP.Storage.saveSettings({ sidebarCompact: compact });
    };
  }

  /* ---------- Boot ---------- */
  function boot() {
    PP.Storage.load();
    const s = PP.Storage.settings();

    // aplica tema salvo
    document.body.classList.toggle('theme-dark', s.theme === 'dark');
    const themeBtn = document.getElementById('btn-theme');
    if (themeBtn) themeBtn.textContent = s.theme === 'dark' ? '☀️' : '🌙';
    if (s.accentTheme && s.accentTheme !== 'green') {
      document.body.classList.add('theme-accent-' + s.accentTheme);
    }
    if (s.sidebarCompact) {
      document.getElementById('app').classList.add('sidebar-compact');
      const collapseBtn = document.getElementById('sidebar-collapse-btn');
      if (collapseBtn) { collapseBtn.textContent = '»'; collapseBtn.title = 'Expandir menu'; }
    }

    refreshProfile();
    U.attachRipples(document);

    // topo
    document.getElementById('btn-theme').onclick = toggleTheme;
    document.getElementById('btn-new-client').onclick = () => PP.Clients.openForm();
    document.getElementById('btn-profile').onclick = () => PP.Router.go('configuracoes');
    setupSearch();
    setupNotifications();
    setupMobileMenu();
    setupSidebarCollapse();

    // rota inicial
    if (!location.hash) location.hash = '#/dashboard';
    PP.Router.start();
    PP.Notifications.refreshBadge();
  }

  function init() {
    PP.Storage.load();

    const startAfterLogin = () => {
      document.getElementById('loading-screen').hidden = false;
      runLoading(() => {
        document.getElementById('app').hidden = false;
        boot();
      });
    };

    if (PP.Auth.isLoggedIn()) {
      document.getElementById('login-screen')?.remove();
      startAfterLogin();
    } else {
      PP.Auth.showLogin(startAfterLogin);
    }
  }

  document.addEventListener('DOMContentLoaded', init);

  PP.App = { setTheme, toggleTheme, refreshProfile, setAccentTheme };
})();

  </script>
</body>
</html>
