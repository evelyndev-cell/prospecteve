<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Prospeceve — CRM fofinho para gestão de clientes, projetos e financeiro de desenvolvimento web." />
  <title>Prospeceve — Seu ateliê de clientes</title>

  <!-- Tipografia arredondada e amigável (carrega da web quando houver internet; há fallback do sistema) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />

  <!-- CSS modular -->
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>
<body>

  <!-- ======================= TELA DE LOGIN ======================= -->
  <div id="login-screen" class="login-screen">
    <div class="login-sky">
      <span class="cloud cloud--1"></span>
      <span class="cloud cloud--2"></span>
      <span class="cloud cloud--3"></span>
    </div>
    <form id="login-form" class="login-card cushion" autocomplete="off">
      <div class="login-card__logo">🌸</div>
      <h1 class="login-card__title">Prospeceve</h1>
      <p class="login-card__sub">Seu ateliê de clientes é só seu. Entre para continuar 🔒</p>

      <div class="form-field form-field--full">
        <label for="login-user">Usuário</label>
        <input class="input" id="login-user" name="username" placeholder="Seu usuário" autocomplete="username" required>
      </div>
      <div class="form-field form-field--full">
        <label for="login-pass">Senha</label>
        <input class="input" id="login-pass" name="password" type="password" placeholder="Sua senha" autocomplete="current-password" required>
      </div>

      <label class="login-card__remember">
        <input type="checkbox" id="login-remember" checked> Manter conectado neste navegador
      </label>

      <p class="login-card__error" id="login-error" hidden>🙈 Usuário ou senha incorretos. Tente de novo!</p>

      <button type="submit" class="pill-btn pill-btn--green login-card__submit">🔑 Entrar</button>
    </form>
  </div>

  <!-- ======================= TELA DE CARREGAMENTO ======================= -->
  <div id="loading-screen" class="loading-screen" aria-hidden="true" hidden>
    <div class="loading-sky">
      <span class="cloud cloud--1"></span>
      <span class="cloud cloud--2"></span>
      <span class="cloud cloud--3"></span>
      <span class="cloud cloud--4"></span>
    </div>

    <div class="loading-content">
      <div class="loading-logo">🌸</div>
      <h1 class="loading-title">Prospeceve</h1>
      <p class="loading-message">Preparando seu espaço de trabalho…</p>
      <div class="loading-bar">
        <div class="loading-bar__fill" id="loading-bar-fill"></div>
      </div>
      <span class="loading-percent" id="loading-percent">0%</span>
    </div>
  </div>

  <!-- ======================= APLICAÇÃO ======================= -->
  <div id="app" class="app" hidden>

    <!-- ---------- MENU LATERAL (tecido costurado) ---------- -->
    <aside class="sidebar" id="sidebar" aria-label="Menu principal">
      <div class="sidebar__brand">
        <span class="sidebar__flower">🌷</span>
        <span class="sidebar__brand-name">Prospeceve</span>
        <button type="button" class="sidebar__collapse-btn" id="sidebar-collapse-btn"
          aria-label="Recolher menu" title="Recolher menu">«</button>
      </div>

      <nav class="sidebar__nav" aria-label="Navegação">
        <a class="nav-item" href="#/dashboard" data-route="dashboard">
          <span class="nav-item__icon">🏠</span><span class="nav-item__label">Dashboard</span>
        </a>
        <a class="nav-item" href="#/clientes" data-route="clientes">
          <span class="nav-item__icon">🧵</span><span class="nav-item__label">Clientes</span>
        </a>
        <a class="nav-item" href="#/projetos" data-route="projetos">
          <span class="nav-item__icon">🌼</span><span class="nav-item__label">Projetos</span>
        </a>
        <a class="nav-item" href="#/financeiro" data-route="financeiro">
          <span class="nav-item__icon">🪙</span><span class="nav-item__label">Financeiro</span>
        </a>
        <a class="nav-item" href="#/calendario" data-route="calendario">
          <span class="nav-item__icon">📅</span><span class="nav-item__label">Calendário</span>
        </a>
        <a class="nav-item" href="#/relatorios" data-route="relatorios">
          <span class="nav-item__icon">📋</span><span class="nav-item__label">Relatórios</span>
        </a>
        <a class="nav-item" href="#/arquivos" data-route="arquivos">
          <span class="nav-item__icon">☁️</span><span class="nav-item__label">Arquivos</span>
        </a>
        <a class="nav-item" href="#/configuracoes" data-route="configuracoes">
          <span class="nav-item__icon">⚙️</span><span class="nav-item__label">Configurações</span>
        </a>
      </nav>
    </aside>

    <!-- ---------- CONTEÚDO ---------- -->
    <div class="main">

      <!-- Topo em formato de nuvem -->
      <header class="topbar">
        <button class="icon-btn topbar__menu" id="menu-toggle" aria-label="Abrir menu">☰</button>

        <div class="search">
          <span class="search__icon" aria-hidden="true">🔍</span>
          <input class="search__input" id="global-search" type="search"
                 placeholder="Pesquisar clientes, projetos, cidade…" aria-label="Pesquisar" autocomplete="off" />
          <div class="search__results" id="search-results" hidden></div>
        </div>

        <div class="topbar__actions">
          <button class="pill-btn pill-btn--yellow" id="btn-new-client">
            <span aria-hidden="true">＋</span> Novo cliente
          </button>

          <button class="icon-btn icon-btn--soft" id="btn-notifications" aria-label="Notificações">
            🔔<span class="badge" id="notif-badge" hidden>0</span>
          </button>
          <div class="notif-panel" id="notif-panel" hidden></div>

          <button class="icon-btn icon-btn--soft" id="btn-theme" aria-label="Alternar tema">🌙</button>

          <button class="profile" id="btn-profile" aria-label="Perfil">
            <span class="profile__avatar" id="profile-avatar">EU</span>
            <span class="profile__name" id="profile-name">Você</span>
          </button>
        </div>
      </header>

      <!-- Onde cada tela é injetada pela SPA -->
      <main class="content" id="app-content" tabindex="-1">
        <!-- renderizado por router.js -->
      </main>
    </div>

    <!-- Overlay do menu no mobile -->
    <div class="overlay" id="overlay" hidden></div>
  </div>

  <!-- ---------- Raiz de modais e toasts ---------- -->
  <div id="modal-root"></div>
  <div id="toast-root" class="toast-root" aria-live="polite" aria-atomic="true"></div>

  <!-- ======================= JAVASCRIPT MODULAR (ordem importa) ======================= -->
  <script src="js/utils.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/clients.js"></script>
  <script src="js/projects.js"></script>
  <script src="js/financial.js"></script>
  <script src="js/calendar.js"></script>
  <script src="js/reports.js"></script>
  <script src="js/files.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/router.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
